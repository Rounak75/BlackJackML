<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackjackML — Environment Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e18; color: #f0f4ff; font-family: 'DM Mono', monospace; padding: 32px; }
    h1  { color: #ffd447; font-size: 20px; margin-bottom: 24px; letter-spacing: 0.05em; }
    h2  { color: #94a7c4; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
          margin: 20px 0 8px; }
    .check { display: flex; align-items: center; gap: 10px; padding: 7px 12px;
             border-radius: 6px; margin-bottom: 4px; font-size: 13px;
             background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
    .ok   { color: #44e882; }
    .warn { color: #ffd447; }
    .err  { color: #ff5c5c; font-weight: 700; }
    .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .label { flex: 1; }
    .detail { color: #6b7fa3; font-size: 11px; }
    #socket-status { margin-top: 4px; }
    .btn { margin-top: 24px; padding: 10px 20px; border-radius: 8px; cursor: pointer;
           font-size: 13px; font-weight: 700; border: none;
           background: rgba(255,212,71,0.15); border: 1px solid rgba(255,212,71,0.4);
           color: #ffd447; font-family: inherit; }
    .btn:hover { background: rgba(255,212,71,0.25); }
    #socket-test { margin-top: 12px; padding: 10px 12px; border-radius: 6px; font-size: 12px;
                   background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
                   display: none; }
  </style>
</head>
<body>

<h1>♠ BlackjackML — Environment Test</h1>

<h2>Core Libraries</h2>
<div id="checks-core"></div>

<h2>Bundle</h2>
<div id="checks-bundle"></div>

<h2>Server Connection</h2>
<div id="checks-server"></div>
<button class="btn" id="test-socket-btn" onclick="testSocket()">Test WebSocket Connection</button>
<div id="socket-test"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>

<script>
  function check(containerId, label, ok, detail) {
    const c = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = 'check';
    const status = ok === true ? 'ok' : ok === 'warn' ? 'warn' : 'err';
    const icon   = ok === true ? '✅' : ok === 'warn'  ? '⚠️'  : '❌';
    div.innerHTML = `
      <span class="icon">${icon}</span>
      <span class="label ${status}">${label}</span>
      ${detail ? `<span class="detail">${detail}</span>` : ''}
    `;
    c.appendChild(div);
  }

  // ── Core libraries ──────────────────────────────────────────────
  check('checks-core', 'React 18',
    typeof React !== 'undefined',
    typeof React !== 'undefined' ? 'v' + React.version : 'Not loaded');

  check('checks-core', 'ReactDOM 18',
    typeof ReactDOM !== 'undefined',
    typeof ReactDOM !== 'undefined' ? 'v' + React.version : 'Not loaded');

  check('checks-core', 'Socket.IO client',
    typeof io !== 'undefined',
    typeof io !== 'undefined' ? 'Loaded' : 'Not loaded — check CDN');

  // ── Bundle checks ───────────────────────────────────────────────
  // Test that bundle.min.js globals are available (loaded by index.html in production).
  // On this test page we don't load the full bundle, so we check via fetch instead.
  fetch('/static/bundle.min.js', { method: 'HEAD' })
    .then(r => {
      check('checks-bundle', 'bundle.min.js reachable',
        r.ok,
        r.ok ? `HTTP ${r.status} · ${(r.headers.get('content-length') / 1024).toFixed(0)} KB`
             : `HTTP ${r.status}`);
    })
    .catch(() => check('checks-bundle', 'bundle.min.js reachable', false, 'Fetch failed'));

  fetch('/static/style.css', { method: 'HEAD' })
    .then(r => check('checks-bundle', 'style.css reachable', r.ok, r.ok ? `HTTP ${r.status}` : `HTTP ${r.status}`))
    .catch(() => check('checks-bundle', 'style.css reachable', false, 'Fetch failed'));

  // ── Server connection ───────────────────────────────────────────
  fetch('/api/state')
    .then(r => r.json())
    .then(data => {
      check('checks-server', 'Flask server responding',
        true, '/api/state → 200 OK');

      check('checks-server', 'Game state structure valid',
        data && typeof data.count === 'object' && typeof data.player_hand === 'object',
        data ? 'count + player_hand keys present' : 'Unexpected response shape');

      check('checks-server', 'Advanced Tracking State',
        data && typeof data.zone_config === 'object' && typeof data.wonging_mode === 'object',
        data && data.zone_config ? 'Wonging + Zone configs present' : 'Missing advanced feature state data (build mismatch?)');

      check('checks-server', 'ML model',
        data.ml_available === true ? true : 'warn',
        data.ml_available ? 'models/best_model.pt loaded' : 'Not trained — using rule-based engine');

      const sys = data.count && data.count.system ? data.count.system : 'unknown';
      check('checks-server', 'Counting system',
        true, sys.toUpperCase() + ' active');
    })
    .catch(err => {
      check('checks-server', 'Flask server responding', false,
        'Run: python main.py web — ' + err.message);
      check('checks-server', 'Game state structure valid', false, 'Server not reachable');
      check('checks-server', 'ML model', false, 'Server not reachable');
    });

  // ── WebSocket test ──────────────────────────────────────────────
  function testSocket() {
    const box = document.getElementById('socket-test');
    box.style.display = 'block';
    box.textContent = '⏳ Connecting…';

    const sock = io({ transports: ['websocket'], timeout: 4000 });
    const t = Date.now();

    sock.on('connect', () => {
      sock.on('state_update', data => {
        const ms = Date.now() - t;
        box.innerHTML = `✅ <span style="color:#44e882">WebSocket connected in ${ms}ms</span>
          <br><span style="color:#6b7fa3">Session ID: ${sock.id}</span>
          <br><span style="color:#6b7fa3">state_update received — ${Object.keys(data).length} keys</span>`;
        sock.disconnect();
      });
    });

    sock.on('connect_error', err => {
      box.innerHTML = `❌ <span style="color:#ff5c5c">Connection failed: ${err.message}</span>
        <br><span style="color:#6b7fa3">Make sure python main.py web is running</span>`;
    });

    setTimeout(() => {
      if (!sock.connected) {
        box.innerHTML = `❌ <span style="color:#ff5c5c">Timeout — server not responding</span>`;
        sock.disconnect();
      }
    }, 5000);
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackjackML — Live Counter &amp; AI Advisor</title>
  <meta name="description" content="Real-time blackjack card counting assistant with AI-powered strategy recommendations, Kelly criterion bet sizing, and live shoe tracking." />

  <!-- Preconnect: start DNS + TLS for fonts before parser reaches the link tag -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!--
    Font loading strategy:
    - display=swap: text renders in fallback font immediately, swaps when loaded
    - This eliminates FOIT (Flash Of Invisible Text) which tanks LCP
  -->
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
  />

  <!--
    Tailwind CDN: still here for utility classes used throughout components.
    The config must stay in <head> so Tailwind's runtime picks it up before
    the first render. A future Tailwind CLI build would eliminate this entirely.
  -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Inter', 'sans-serif'],
            mono:    ['JetBrains Mono', 'monospace'],
            body:    ['Inter', 'sans-serif'],
          },
          colors: {
            base:  { DEFAULT: '#0a0e18', 1: '#111827', 2: '#1a2236', 3: '#212d45', 4: '#2a3a58' },
            gold:  { DEFAULT: '#ffd447', dim: '#c49a18' },
            jade:  { DEFAULT: '#44e882', dim: 'rgba(68,232,130,0.18)' },
            ruby:  { DEFAULT: '#ff5c5c', dim: 'rgba(255,92,92,0.18)' },
            sapph: { DEFAULT: '#6aafff', dim: 'rgba(106,175,255,0.18)' },
            ameth: { DEFAULT: '#b99bff', dim: 'rgba(185,155,255,0.18)' },
          },
        }
      }
    }
  </script>

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="bg-base font-body min-h-screen overflow-x-hidden">

  <!-- ACCESSIBILITY: role="main" identifies the primary content region for AT -->
  <div id="root" role="main" aria-label="BlackjackML dashboard" style="min-height:100vh"></div>

  <!--
    ACCESSIBILITY: role="status" + aria-live="polite" — screen readers will
    announce new toast messages without interrupting current speech.
  -->
  <div
    id="toasts"
    class="fixed top-16 right-4 z-50 flex flex-col gap-2 pointer-events-none"
    role="status"
    aria-live="polite"
    aria-atomic="false"
    aria-label="Notifications"
  ></div>

  <!-- Socket.IO: must load before the app bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>

  <!--
    PERFORMANCE: React 18 PRODUCTION builds.
    react.production.min.js = ~11 KB gzipped vs ~100 KB for development.
    Strips all dev warnings, prop-type checking, and internal tooling.
  -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!--
    PERFORMANCE: Pre-compiled bundle — NO Babel in the browser.

    Old approach: 20+ individual files + @babel/standalone (~1.5 MB) compiled
    JSX to JS at runtime on every page load. This blocked the main thread for
    1-3 seconds before any React component could render.

    New approach: TypeScript compiler (tsc) pre-compiles all JSX server-side
    into standard ES2018 JavaScript. The browser receives plain JS — no
    transformation needed. This eliminates the entire Babel parse+compile step.

    Result: ~1.7 MB of scripts removed from the critical path.
    Single request instead of 22 separate HTTP round-trips.
    200 KB pre-compiled JS vs 1.5 MB Babel + 20 source files.
  -->
  <script src="/static/bundle.min.js"></script>
</body>
</html>
